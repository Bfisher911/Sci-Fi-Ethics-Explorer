<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="Professor Paradox">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="hsl(181, 100%, 65%)" stop-opacity="0.95" />
      <stop offset="55%" stop-color="hsl(240, 60%, 22%)" stop-opacity="1" />
      <stop offset="100%" stop-color="hsl(240, 70%, 10%)" stop-opacity="1" />
    </radialGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="hsl(181, 100%, 74%)" />
      <stop offset="50%" stop-color="hsl(300, 100%, 70%)" />
      <stop offset="100%" stop-color="hsl(181, 100%, 74%)" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="38%">
      <stop offset="0%" stop-color="hsl(181, 100%, 80%)" stop-opacity="0.45" />
      <stop offset="100%" stop-color="hsl(181, 100%, 80%)" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Background disk -->
  <circle cx="128" cy="128" r="128" fill="url(#bg)" />
  <circle cx="128" cy="128" r="124" fill="none" stroke="url(#ring)" stroke-width="3" />

  <!-- Möbius-like ribbon, the paradox motif -->
  <g transform="translate(128 128)" stroke="hsl(181, 100%, 78%)" stroke-width="3.5" fill="none" stroke-linecap="round">
    <ellipse cx="0" cy="0" rx="68" ry="34" transform="rotate(-22)" opacity="0.95" />
    <ellipse cx="0" cy="0" rx="68" ry="34" transform="rotate(22)" opacity="0.7" />
    <ellipse cx="0" cy="0" rx="68" ry="34" transform="rotate(68)" opacity="0.45" stroke="hsl(300, 100%, 78%)" />
  </g>

  <!-- Soft inner glow -->
  <circle cx="128" cy="128" r="128" fill="url(#glow)" />

  <!-- Constellation accents -->
  <g fill="hsl(181, 100%, 88%)">
    <circle cx="58" cy="74" r="2.2" opacity="0.85" />
    <circle cx="200" cy="86" r="1.6" opacity="0.7" />
    <circle cx="74" cy="200" r="1.8" opacity="0.7" />
    <circle cx="194" cy="190" r="2.4" opacity="0.85" />
    <circle cx="44" cy="146" r="1.4" opacity="0.6" />
    <circle cx="218" cy="142" r="1.4" opacity="0.6" />
  </g>

  <!-- Initials -->
  <text x="128" y="148" text-anchor="middle"
        font-family="Inter, ui-sans-serif, system-ui, sans-serif"
        font-weight="700" font-size="68"
        fill="hsl(181, 100%, 92%)" letter-spacing="-2">
    PΠ
  </text>
</svg>
